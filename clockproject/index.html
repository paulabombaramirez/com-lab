<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fruit Clock</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div id="clock">
        <div class="unit">    
        <div class="fruit-wrap">
                <img src="Subject 2.png" alt="pear">
                <div class="pear1 seed-zone"></div>
            </div>
        </div>

        <div class="unit">
            <div class="fruit-wrap">
            <img src="Subject 2.png" alt="pear">
            <div class="pear2 seed-zone"></div>
            </div>
        </div>

        <div class="colon">:</div>

        <div class="unit">
            <div class="fruit-wrap">
                <img src="Subject2.png" alt="apple">
                <div class="apple-left seed-zone"></div>
                <div class="apple-right seed-zone"></div>
            </div>
        </div>

        <div class="colon">:</div>

        <div class="unit">
            <div class="fruit-wrap">
                <img src="Subject.png" alt="watermelon">
                <div class="watermelon seed-zone"></div>
            </div>
        </div>

    </div>
<audio id="rty" src="rty.mp3" loop></audio>

<button id="soundBtn">ON</button>
</body>
</html>
