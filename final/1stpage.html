<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romeo + Juliet</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<div id="pageWrapper">

  <div class="windowHeight">
    <img src="disney.png" alt="disney">
    <div class="girl">
      <img src="girl.png">
    </div>
    <div class="boy">
      <img src="boy.png">
    
    </div>
    <div class="scroll">
    <p> scroll</p>
    <p>▼</p>
    </div>
  </div>

  <div class="topbar">
    <p>MESSAGES</p>
  </div>

  <div class="maincontent" id="messages"></div>

  <div class="leftside">
    <img src="romeo.png" alt="romeo">
    <p>romeo</p>
  </div>

  <div class="rightside">
    <img src="juliett.png" alt="juliet">
    <p>juliet</p>
  </div>

  <div class="telephonewrapper">
    <p id="romeoCall"></p>
    <div id="call">
      <img src="call.png">
    </div>
    <p id="julietCall"></p>
  </div>

  <div class="finalsection"></div>

  <div class="topbar2">
    <p>MESSAGES</p>
  </div>

  <div class="maincontent" id="finalMessages"></div>

  <div class="leftside2">
    <img src="juliett2.png" alt="juliet">
    <p>juliet</p>
  </div>

  <div class="rightside2">
    
  </div>

  <div class="whitesection"></div>
   <div class="endsection">
    <img src="disney.png" alt="disney">
    <div class="girl">
      <img src="girl.png">
      <p class="girlSpeech" id="girlSpeech"></p>
    </div>
    <div class="endboy">
      <img src="boy.png">
      <p class="boySpeech" id="boySpeech"></p>
    </div>
   </div>

  <div class="theend">
    <p>the end.</p>
  </div>

</div>

</body>
</html>
