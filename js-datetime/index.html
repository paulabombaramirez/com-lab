<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fruit Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Fruit Clock</h1>

    <div id="clock">

        <div class="unit">
            <span class="label">H</span>
            <div class="fruit-wrap">
                <img src="Subject 2.png" alt="pear">
                <div class="pear1 seed-zone"></div>
            </div>
        </div>

        <div class="unit">
            <span class="label">H</span>
            <div class="fruit-wrap">
                <img src="Subject 2.png" alt="pear">
                <div class="pear2 seed-zone"></div>
            </div>
        </div>

        <div class="colon">:</div>

        <div class="unit">
            <span class="label">M</span>
            <div class="fruit-wrap">
                <img src="Subject2.png" alt="apple">
                <div class="apple-left seed-zone"></div>
                <div class="apple-right seed-zone"></div>
            </div>
        </div>

        <div class="colon">:</div>

        <div class="unit">
            <span class="label">S</span>
            <div class="fruit-wrap">
                <img src="Subject.png" alt="watermelon">
                <div class="watermelon seed-zone"></div>
            </div>
        </div>

    </div>

    <script src="clock.js"></script>
</body>
</html>
